name: godot-ci
on:
  push:
    branches: [master]
env:
  GODOT_VERSION: "4.6.2"

jobs:
  export-game:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Export game
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Godot Export
      id: export
      uses: firebelley/godot-export@v7.0.0
      with:
        godot_executable_download_url: https://github.com/godotengine/godot/releases/download/${{env.GODOT_VERSION}}-stable/Godot_v${{env.GODOT_VERSION}}-stable_linux.x86_64.zip
        godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/${{env.GODOT_VERSION}}-stable/Godot_v${{env.GODOT_VERSION}}-stable_export_templates.tpz
        relative_project_path: ./
        export_path: ./builds/OPD_Lab3.exe
        cache: true
        archive_output: true
        use_preset_export_path: true
        verbose: true
      env:
       GITHUB_TOKEN: ${{secrets.GH_TOKEN}}

    - name: create release
      uses: softprops/action-gh-release@v2
      with:
        tag-name: ${{github.ref_name}}
        name: Release ${{github.ref_name}}
        generate_release_notes: true
        files: ${{steps.export.outputs.archive_directory}}/**/*
        make_latest: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{secrets.GH_TOKEN}}
